name: GitHub Actions Demo
# syntax https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
# github context https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#github-context

run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
# supported events https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows
on: [push]
jobs:
  Explore-GitHub-Actions:
    # The type of runner that the job will run on ref https://github.com/actions/runner-images?tab=readme-ov-file
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v5
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - run: echo "🍏 This job's status is ${{ job.status }}."
  test:
    runs-on: ubuntu-slim
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
  build:
    runs-on: ubuntu-slim
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
  tag:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v4
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
